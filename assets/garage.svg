<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Garage entrance illustration">
  <defs>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="260" fill="#0d0d0d"/>

  <!-- floor -->
  <rect x="0" y="200" width="1200" height="60" fill="url(#floorGrad)"/>
  <g stroke="#262626" stroke-width="2">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="230" x2="1200" y2="230"/>
  </g>
  <!-- floor hazard markings -->
  <g fill="#FFB200" opacity="0.85">
    <polygon points="100,255 130,255 115,235"/>
    <polygon points="200,255 230,255 215,235"/>
    <polygon points="970,255 1000,255 985,235"/>
    <polygon points="1070,255 1100,255 1085,235"/>
  </g>

  <!-- door bay -->
  <rect x="350" y="20" width="500" height="190" fill="#161616" stroke="#3a3a3a" stroke-width="3"/>
  <g stroke="#222" stroke-width="2">
    <line x1="350" y1="60" x2="850" y2="60"/>
    <line x1="350" y1="100" x2="850" y2="100"/>
    <line x1="350" y1="140" x2="850" y2="140"/>
    <line x1="350" y1="180" x2="850" y2="180"/>
  </g>

  <!-- side control panel -->
  <rect x="900" y="60" width="70" height="110" rx="6" fill="#1d1d1d" stroke="#444" stroke-width="2"/>
  <circle cx="935" cy="90" r="14" fill="#FF7A00"/>
  <circle cx="935" cy="90" r="14" fill="none" stroke="#FFB200" stroke-width="2">
    <animate attributeName="r" values="14;18;14" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <rect x="918" y="118" width="34" height="8" rx="2" fill="#0a0a0a"/>
  <rect x="918" y="132" width="34" height="8" rx="2" fill="#0a0a0a"/>
  <rect x="918" y="146" width="22" height="8" rx="2" fill="#FFB200"/>
  <text x="935" y="180" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#777" letter-spacing="1">PANEL</text>

  <!-- hanging light -->
  <line x1="600" y1="0" x2="600" y2="40" stroke="#444" stroke-width="2"/>
  <circle cx="600" cy="48" r="12" fill="#FFB200">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="48" r="40" fill="#FFB200" opacity="0.08"/>

  <text x="600" y="245" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#666" letter-spacing="3">ENTRANCE — WIPE YOUR FEET, BUILD SOMETHING</text>
</svg>
