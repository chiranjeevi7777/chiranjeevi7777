<svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ScholarGuard AI project card">
  <defs>
    <linearGradient id="wood1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1410"/>
      <stop offset="100%" stop-color="#100c0a"/>
    </linearGradient>
    <linearGradient id="metal1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- workbench surface -->
  <rect width="760" height="280" fill="url(#wood1)"/>
  <g stroke="#000" stroke-opacity="0.25" stroke-width="1">
    <line x1="0" y1="60" x2="760" y2="60"/>
    <line x1="0" y1="220" x2="760" y2="220"/>
  </g>

  <!-- the product chassis card -->
  <rect x="24" y="24" width="712" height="232" rx="6" fill="url(#metal1)" stroke="#FFB200" stroke-width="1.5"/>
  <rect x="36" y="36" width="688" height="208" rx="4" fill="none" stroke="#333" stroke-width="1"/>

  <!-- rivets -->
  <circle cx="48" cy="48" r="3" fill="#444"/>
  <circle cx="712" cy="48" r="3" fill="#444"/>
  <circle cx="48" cy="232" r="3" fill="#444"/>
  <circle cx="712" cy="232" r="3" fill="#444"/>

  <!-- status LED -->
  <circle cx="680" cy="60" r="6" fill="#4ADE80">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="660" y="64" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#4ADE80" letter-spacing="1">LIVE</text>

  <!-- name plate -->
  <text x="56" y="78" font-family="'JetBrains Mono', monospace" font-size="26" font-weight="700" fill="#F5F5F0">ScholarGuard AI</text>
  <text x="56" y="100" font-family="'JetBrains Mono', monospace" font-size="13" fill="#9a9a9a">Academic integrity verification engine</text>

  <!-- divider -->
  <line x1="56" y1="116" x2="704" y2="116" stroke="#333" stroke-width="1"/>

  <!-- spec rows -->
  <text x="56" y="140" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFB200" letter-spacing="1">VERSION</text>
  <text x="56" y="158" font-family="'JetBrains Mono', monospace" font-size="14" fill="#e0e0e0">v2.3.0</text>

  <text x="220" y="140" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFB200" letter-spacing="1">STACK</text>
  <text x="220" y="158" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e0e0e0">Python / FastAPI / LLM</text>

  <text x="56" y="190" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFB200" letter-spacing="1">ROADMAP</text>
  <text x="56" y="208" font-family="'JetBrains Mono', monospace" font-size="12" fill="#bbb">Multi-language support -> Q3</text>

  <!-- progress bar -->
  <text x="500" y="140" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFB200" letter-spacing="1">BUILD PROGRESS</text>
  <rect x="500" y="148" width="204" height="14" rx="3" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <rect x="503" y="151" width="182" height="8" rx="2" fill="#FFB200"/>
  <text x="704" y="170" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#e0e0e0">92%</text>

  <!-- serial footer -->
  <text x="704" y="225" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#555" letter-spacing="1">SN-0001 — GARAGE BUILD</text>
</svg>
