<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Coffee corner illustration">
  <rect width="1200" height="200" fill="#0d0d0d"/>

  <!-- counter -->
  <rect x="0" y="140" width="1200" height="60" fill="#161616"/>
  <line x1="0" y1="140" x2="1200" y2="140" stroke="#FF7A00" stroke-width="2" opacity="0.5"/>

  <!-- coffee machine -->
  <g transform="translate(520,40)">
    <rect x="0" y="0" width="90" height="100" rx="4" fill="#1d1d1d" stroke="#FFB200" stroke-width="2"/>
    <rect x="14" y="14" width="62" height="20" rx="2" fill="#0a0a0a"/>
    <circle cx="45" cy="55" r="4" fill="#FFB200">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <rect x="30" y="70" width="30" height="6" fill="#444"/>
    <!-- steam -->
    <path d="M40,0 Q35,-15 40,-25 Q45,-35 40,-45" stroke="#999" stroke-width="2" fill="none" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M55,0 Q50,-15 55,-25 Q60,-35 55,-45" stroke="#999" stroke-width="2" fill="none" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- mug -->
  <g transform="translate(660,100)">
    <rect x="0" y="0" width="40" height="34" rx="3" fill="#1d1d1d" stroke="#FF7A00" stroke-width="2"/>
    <path d="M40,8 q12,0 12,12 q0,12 -12,12" fill="none" stroke="#FF7A00" stroke-width="2"/>
  </g>

  <!-- whiteboard with handwritten-style note -->
  <g transform="translate(280,40)">
    <rect x="0" y="0" width="160" height="100" rx="2" fill="#f0f0e8" opacity="0.92"/>
    <text x="80" y="35" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="13" fill="#1a1a1a">Ideas board</text>
    <line x1="15" y1="50" x2="145" y2="50" stroke="#333" stroke-width="1" opacity="0.5"/>
    <text x="20" y="68" font-family="'Comic Sans MS', cursive" font-size="11" fill="#444">- ship faster</text>
    <text x="20" y="84" font-family="'Comic Sans MS', cursive" font-size="11" fill="#444">- sleep more (lol)</text>
  </g>

  <text x="600" y="190" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#666" letter-spacing="3">BREAK ROOM — REFUEL AND KEEP BUILDING</text>
</svg>
