<svg viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shipping dock illustration">
  <rect width="1200" height="220" fill="#0d0d0d"/>
  <rect x="0" y="170" width="1200" height="50" fill="#161616"/>
  <line x1="0" y1="170" x2="1200" y2="170" stroke="#FFB200" stroke-width="3" opacity="0.6"/>

  <!-- crates -->
  <g>
    <g transform="translate(140,90)">
      <rect width="120" height="90" fill="#1d1d1d" stroke="#FFB200" stroke-width="2"/>
      <line x1="0" y1="0" x2="120" y2="90" stroke="#FFB200" stroke-width="1" opacity="0.4"/>
      <line x1="120" y1="0" x2="0" y2="90" stroke="#FFB200" stroke-width="1" opacity="0.4"/>
      <text x="60" y="50" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#e0e0e0">SHIPPED</text>
      <text x="60" y="68" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#FFB200">v2.3.0</text>
    </g>
    <g transform="translate(300,110)">
      <rect width="100" height="70" fill="#1d1d1d" stroke="#FF7A00" stroke-width="2"/>
      <line x1="0" y1="0" x2="100" y2="70" stroke="#FF7A00" stroke-width="1" opacity="0.4"/>
      <line x1="100" y1="0" x2="0" y2="70" stroke="#FF7A00" stroke-width="1" opacity="0.4"/>
      <text x="50" y="40" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#e0e0e0">LIVE</text>
    </g>
    <g transform="translate(450,80)">
      <rect width="130" height="100" fill="#1d1d1d" stroke="#FFB200" stroke-width="2"/>
      <line x1="0" y1="0" x2="130" y2="100" stroke="#FFB200" stroke-width="1" opacity="0.4"/>
      <line x1="130" y1="0" x2="0" y2="100" stroke="#FFB200" stroke-width="1" opacity="0.4"/>
      <text x="65" y="55" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#e0e0e0">DEPLOYED</text>
    </g>
  </g>

  <!-- forklift suggestion via simple shapes -->
  <g transform="translate(750,140)">
    <rect x="0" y="0" width="60" height="30" rx="3" fill="#222" stroke="#FF7A00" stroke-width="1.5"/>
    <circle cx="12" cy="35" r="8" fill="#111" stroke="#444" stroke-width="2"/>
    <circle cx="48" cy="35" r="8" fill="#111" stroke="#444" stroke-width="2"/>
    <line x1="60" y1="5" x2="90" y2="-25" stroke="#FF7A00" stroke-width="3"/>
    <line x1="60" y1="25" x2="90" y2="-5" stroke="#FF7A00" stroke-width="3"/>
  </g>

  <text x="600" y="205" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#666" letter-spacing="3">LOADING DOCK — OUTBOUND TO PRODUCTION</text>
</svg>
