<svg viewBox="0 0 1200 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Factory dashboard control panel frame top">
  <defs>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="110" fill="url(#panelGrad)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#FFB200"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- gauge cluster -->
    <circle cx="70" cy="55" r="30" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="70" cy="55" r="30" fill="none" stroke="#FFB200" stroke-width="6" stroke-dasharray="141 188" stroke-linecap="round" transform="rotate(-90 70 55)"/>
    <text x="70" y="60" text-anchor="middle" font-size="12" fill="#e0e0e0">UPTIME</text>

    <circle cx="160" cy="55" r="30" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="160" cy="55" r="30" fill="none" stroke="#FF7A00" stroke-width="6" stroke-dasharray="100 188" stroke-linecap="round" transform="rotate(-90 160 55)"/>
    <text x="160" y="60" text-anchor="middle" font-size="12" fill="#e0e0e0">LOAD</text>

    <text x="600" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#F5F5F0" letter-spacing="2">LIVE TELEMETRY FEED</text>
    <text x="600" y="72" text-anchor="middle" font-size="12" fill="#777" letter-spacing="1">real-time metrics pulled directly from GitHub</text>

    <!-- right side blinkers -->
    <circle cx="1100" cy="40" r="5" fill="#4ADE80">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="1115" y="44" font-size="11" fill="#4ADE80">ONLINE</text>
    <circle cx="1100" cy="70" r="5" fill="#FFB200">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="1115" y="74" font-size="11" fill="#FFB200">SYNCING</text>
  </g>
</svg>
