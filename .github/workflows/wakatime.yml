name: Update WakaTime Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_TIME: true
          SHOW_TITLE: true
          SHOW_LANGUAGE: true
          BLOCKS: "▓▓▓▓▓▓░░░░"
          TARGET_BRANCH: main
          COMMIT_MESSAGE: "chore: update wakatime metrics"
